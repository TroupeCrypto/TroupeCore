name: Auto Merge Pull Requests
on:
  pull_request:
    types: [labeled, unlabeled, opened, edited, synchronize, ready_for_review, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["Unified Build & Deploy"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for checks
        uses: actions/github-script@v7
        with:
          script: |
            const maxRetries = 30;
            const retryDelay = 60000; // 60 seconds
            const timeout = 30 * 60 * 1000; // 30 minutes
            const startTime = Date.now();

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request?.number || context.payload.workflow_run?.pull_requests?.[0]?.number
            });
            if (!pr) { core.setFailed("No pull request context"); return; }

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });

              const pending = checks.check_runs.filter(c => c.status !== 'completed');
              const failed = checks.check_runs.filter(c => c.conclusion === 'failure' || c.conclusion === 'cancelled');
              const allPassed = checks.check_runs.every(c => c.conclusion === "success" || c.conclusion === "skipped");

              core.info(`Attempt ${attempt}/${maxRetries}: Total checks: ${checks.check_runs.length}, Pending: ${pending.length}, Failed: ${failed.length}`);
              
              if (allPassed) {
                core.info("✅ All checks passed!");
                return;
              }

              // Check if we've exceeded the timeout
              if (Date.now() - startTime > timeout) {
                core.setFailed(`⏱️ Timeout exceeded after ${timeout / 1000 / 60} minutes. Checks still not complete.`);
                return;
              }

              // If this is not the last attempt, wait before retrying
              if (attempt < maxRetries) {
                core.info(`⏳ Waiting ${retryDelay / 1000} seconds before next check...`);
                await new Promise(resolve => setTimeout(resolve, retryDelay));
              }
            }

            // If we've exhausted all retries
            core.setFailed(`❌ Checks did not pass after ${maxRetries} attempts. Please review the failing checks.`);

      - name: Auto merge PR
        uses: pascalgn/automerge-action@v0.15.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: ""
          MERGE_REMOVE_LABELS: ""
          MERGE_RETRY_SLEEP: 60000
          MERGE_RETRIES: 30
          UPDATE_METHOD: merge
